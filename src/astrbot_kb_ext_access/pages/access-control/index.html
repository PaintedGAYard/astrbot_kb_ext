<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>知识库访问控制</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; color: #1a1a2e; background: #f5f5f9; padding: 24px; }
.container { max-width: 720px; margin: 0 auto; }
h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
.subtitle { color: #666; font-size: 13px; margin-bottom: 20px; }
.section { background: #fff; border-radius: 8px; padding: 16px; margin-bottom: 16px; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.section-title { font-size: 14px; font-weight: 600; margin-bottom: 12px; display: flex; align-items: center; gap: 6px; }
.section-hint { font-size: 12px; color: #888; margin-bottom: 12px; }
.section-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; gap: 8px; }
.kb-row { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #f0f0f0; }
.kb-row:last-child { border-bottom: none; }
.kb-row:hover { background: #f8f8ff; border-radius: 6px; }
.kb-info { flex: 1; min-width: 0; }
.kb-name { font-size: 14px; font-weight: 500; }
.kb-meta { font-size: 12px; color: #888; margin-top: 2px; }
.kb-id-text { font-size: 11px; color: #aaa; font-family: monospace; }
.badge { display: inline-block; font-size: 11px; padding: 1px 6px; border-radius: 4px; margin-left: 6px; }
.badge-wl { background: #e3f2fd; color: #1565c0; }
.badge-bl { background: #fce4ec; color: #c62828; }
.remove-btn { background: none; border: none; color: #bbb; cursor: pointer; font-size: 16px; padding: 4px 8px; border-radius: 4px; line-height:1; }
.remove-btn:hover { background: #fee; color: #c62828; }
.empty-state { text-align: center; padding: 24px; color: #aaa; font-size: 13px; }
.actions { display: flex; gap: 8px; margin-top: 16px; }
.btn { padding: 8px 20px; border: none; border-radius: 6px; font-size: 14px; cursor: pointer; font-weight: 500; }
.btn-primary { background: #5b5bd7; color: #fff; }
.btn-primary:hover { background: #4a4ac2; }
.btn-primary:disabled { background: #b0b0d0; cursor: not-allowed; }
.btn-add { background: #e8e8ff; color: #5b5bd7; border: 1px dashed #c0c0e8; padding: 5px 14px; font-size: 13px; white-space:nowrap; flex-shrink:0; }
.btn-add:hover { background: #dcdcff; }
.status { padding: 10px 14px; border-radius: 6px; margin-bottom: 16px; font-size: 13px; display: none; }
.status-success { display: block; background: #e8f5e9; color: #2e7d32; }
.status-error { display: block; background: #fbe9e7; color: #c62828; }
.loading { text-align: center; padding: 60px 40px; color: #888; }
.spinner { display: inline-block; width: 24px; height: 24px; border: 3px solid #e0e0e0; border-top-color: #5b5bd7; border-radius: 50%; animation: spin .8s linear infinite; margin-bottom: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.3); z-index: 1000; align-items: center; justify-content: center; }
.overlay.open { display: flex; }
.dialog { background: #fff; border-radius: 12px; width: 92%; max-width: 560px; max-height: 80vh; display: flex; flex-direction: column; box-shadow: 0 8px 32px rgba(0,0,0,.15); }
.dialog-title { font-size: 16px; font-weight: 600; padding: 16px 20px 0; }
.dialog-subtitle { font-size: 12px; color: #888; padding: 4px 20px 12px; }
.dialog-list { flex: 1; overflow-y: auto; padding: 0 8px; }
.dialog-actions { display: flex; justify-content: flex-end; gap: 8px; padding: 12px 20px; border-top: 1px solid #f0f0f0; }
.dialog-item { display: flex; align-items: center; padding: 8px; border-bottom: 1px solid #f5f5f5; cursor: pointer; border-radius: 6px; }
.dialog-item:hover { background: #f8f8ff; }
.dialog-item.active { background: #f0f0ff; }
.dialog-cb { width: 18px; height: 18px; margin-right: 10px; accent-color: #5b5bd7; pointer-events: none; }
</style>
</head>
<body>
<div class="container">
  <h1>📚 知识库访问控制</h1>
  <p class="subtitle">选择允许或禁止 Agent 访问的知识库</p>
  <div id="status-bar" class="status"></div>
  <div id="loading" class="loading"><div class="spinner"></div><div>加载中...</div></div>
  <div id="main-content" style="display:none">
    <div class="section">
      <div class="section-header">
        <div><div class="section-title">✅ 白名单</div><div class="section-hint">仅允许 Agent 访问以下知识库。</div></div>
        <button class="btn btn-add" onclick="openPicker('whitelist')">＋ 添加</button>
      </div>
      <div id="wl-list"></div>
    </div>
    <div class="section">
      <div class="section-header">
        <div><div class="section-title">🚫 黑名单</div><div class="section-hint">禁止 Agent 访问以下知识库。黑名单优先级高于白名单。</div></div>
        <button class="btn btn-add" onclick="openPicker('blacklist')">＋ 添加</button>
      </div>
      <div id="bl-list"></div>
    </div>
    <div class="actions">
      <button class="btn btn-primary" id="save-btn" onclick="saveConfig()">💾 保存配置</button>
    </div>
  </div>
</div>

<div class="overlay" id="picker">
  <div class="dialog">
    <div class="dialog-title" id="picker-title">选择知识库</div>
    <div class="dialog-subtitle" id="picker-sub">勾选要添加的知识库</div>
    <div class="dialog-list" id="picker-items"></div>
    <div class="dialog-actions">
      <button class="btn" style="background:#eee;color:#666;padding:6px 16px;" onclick="closePicker()">取消</button>
      <button class="btn btn-primary" style="padding:6px 16px;" onclick="confirmPicker()">确认添加</button>
    </div>
  </div>
</div>

<script src="/api/plugin/page/bridge-sdk.js"></script>
<script>
const KB = window.AstrBotPluginPage;
let allKbs = [];
let wl = new Set(), bl = new Set(), mode = 'whitelist';
let pickerTarget = 'whitelist', pickerSel = new Set();

async function loadCfg() {
  try {
    const r = await KB.apiGet('access-control/config');
    // 桥接层已剥掉 data 包装，r = {kb_access_control: {mode, whitelist, blacklist}}
    const c = r?.kb_access_control || {};
    mode = c.mode || 'whitelist';
    wl = new Set(c.whitelist || []);
    bl = new Set(c.blacklist || []);
  } catch (e) { console.warn(e); }
}

function renderSection(id, set, badge, label) {
  const el = document.getElementById(id);
  const items = allKbs.filter(kb => set.has(kb.kb_id));
  if (!items.length) {
    el.innerHTML = '<div class="empty-state">暂未添加，点击上方 "＋添加" 选择。</div>';
    return;
  }
  el.innerHTML = items.map(kb =>
    `<div class="kb-row">
      <div class="kb-info">
        <div class="kb-name">${kb.emoji||'📚'} ${esc(kb.kb_name)} <span class="badge ${badge}">${label}</span></div>
        <div class="kb-meta"><span class="kb-id-text">${kb.kb_id}</span></div>
      </div>
      <button class="remove-btn" onclick="remove('${kb.kb_id}')" title="移除">✕</button>
    </div>`
  ).join('');
}

function render() { renderSection('wl-list',wl,'badge-wl','白名单'); renderSection('bl-list',bl,'badge-bl','黑名单'); }

function remove(id) { wl.delete(id); bl.delete(id); render(); }

function openPicker(target) {
  pickerTarget = target; pickerSel = new Set();
  const exclude = target==='whitelist' ? wl : bl;
  const avail = allKbs.filter(kb => !exclude.has(kb.kb_id));
  document.getElementById('picker-title').textContent = target==='whitelist' ? '选择要加入白名单的知识库' : '选择要加入黑名单的知识库';
  document.getElementById('picker-sub').textContent = `共 ${avail.length} 个知识库可供选择（全部 ${allKbs.length} 个）`;
  const el = document.getElementById('picker-items');
  if (!avail.length) { el.innerHTML = '<div class="empty-state">所有知识库已在列表中。</div>'; }
  else {
    el.innerHTML = avail.map(kb =>
      `<div class="dialog-item" onclick="togglePick('${kb.kb_id}')" id="pi-${kb.kb_id}">
        <input type="checkbox" class="dialog-cb" id="cb-${kb.kb_id}">
        <div class="kb-info">
          <div class="kb-name">${kb.emoji||'📚'} ${esc(kb.kb_name)}</div>
          <div class="kb-meta"><span class="kb-id-text">${kb.kb_id}</span></div>
        </div>
      </div>`
    ).join('');
  }
  document.getElementById('picker').classList.add('open');
}

function closePicker() { document.getElementById('picker').classList.remove('open'); }

function togglePick(id) {
  const cb = document.getElementById('cb-'+id), el = document.getElementById('pi-'+id);
  if (pickerSel.has(id)) { pickerSel.delete(id); cb.checked=false; el.classList.remove('active'); }
  else { pickerSel.add(id); cb.checked=true; el.classList.add('active'); }
}

function confirmPicker() {
  for (const id of pickerSel) {
    if (pickerTarget==='whitelist') { wl.add(id); bl.delete(id); }
    else { bl.add(id); wl.delete(id); }
  }
  closePicker(); render();
}

async function saveConfig() {
  const btn = document.getElementById('save-btn'), sb = document.getElementById('status-bar');
  btn.disabled = true; sb.className = 'status'; sb.style.display = 'none';
  try {
    await KB.apiPost('access-control/save', { kb_access_control: { mode, whitelist:[...wl], blacklist:[...bl] } });
    sb.className = 'status status-success'; sb.textContent = '✅ 配置已保存'; sb.style.display = 'block';
  } catch(e) {
    sb.className = 'status status-error'; sb.textContent = '❌ 保存失败: '+(e.message||'未知错误'); sb.style.display = 'block';
  } finally { btn.disabled = false; }
}

function esc(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }

(async function() {
  await KB.ready();
  try {
    const _r = await KB.apiGet('access-control/kb-list');
    // 桥接层已剥掉 data 包装，直接取 .items
    if (Array.isArray(_r?.items)) allKbs = _r.items;
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="color:#c62828">❌ 加载失败: '+esc(e.message)+'</div>';
    return;
  }
  await loadCfg(); render();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
})();
</script>
</body>
</html>
